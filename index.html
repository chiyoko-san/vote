<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>世界一どうでもいい投票所</title>
<style>
  :root {
    --bg:#f5f6f8; --surface:#ffffff; --surface2:#f0f1f4;
    --text:#1d1d22; --muted:#6b6b76; --hint:#9a9aa4;
    --a:#ff4d8d; --a-bar:#ff4d8d; --a-soft:#ffe3ee;
    --b:#1f9fff; --b-bar:#1f9fff; --b-soft:#dcefff;
    --accent:#ff9500; --accent-soft:#fff0db;
    --border:#e6e7ec; --border2:#dcdde3;
    --shadow:0 1px 3px rgba(20,20,40,0.06), 0 1px 2px rgba(20,20,40,0.04);
    --shadow-lg:0 4px 16px rgba(20,20,40,0.10);
    --radius:18px; --radius-sm:12px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:16px; line-height:1.5; }
  .wrap { max-width:440px; margin:0 auto; padding:20px 14px 64px; }

  .title { text-align:center; margin-bottom:18px; }
  .title h1 { font-size:22px; font-weight:700; margin:0; letter-spacing:-0.01em; }
  .title .sub { font-size:13px; color:var(--muted); margin:6px 0 0; }

  /* プロフィールバー */
  .profbar { display:flex; gap:8px; align-items:center; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px;
    margin-bottom:14px; box-shadow:var(--shadow); }
  .profbar .pinfo { flex:1; color:var(--muted); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .profbar button { border:1px solid var(--border2); background:var(--surface); color:var(--text);
    border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
  .profbar button:active { background:var(--surface2); }

  /* ジャンルバー（横スクロール） */
  .genre-bar { display:flex; gap:8px; overflow-x:auto; padding:2px 0 10px; margin:0 -14px 8px; padding-left:14px; padding-right:14px;
    scroll-snap-type:x proximity; }
  .genre-bar::-webkit-scrollbar { display:none; }
  .gchip { font-size:14px; padding:9px 16px; border-radius:999px; border:1px solid var(--border2);
    background:var(--surface); color:var(--muted); cursor:pointer; white-space:nowrap; flex-shrink:0;
    font-weight:600; box-shadow:var(--shadow); scroll-snap-align:start; }
  .gchip.active { background:var(--text); color:#fff; border-color:var(--text); }

  /* お題リスト */
  .list { display:flex; flex-direction:column; gap:12px; }
  .topic-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; cursor:pointer; box-shadow:var(--shadow); transition:box-shadow 0.2s, transform 0.06s; }
  .topic-card:active { transform:scale(0.997); }
  .topic-card.open { box-shadow:var(--shadow-lg); border-color:var(--border2); }
  .tc-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; }
  .tc-genre { font-size:12px; color:var(--accent); font-weight:700; background:var(--accent-soft);
    padding:4px 10px; border-radius:999px; white-space:nowrap; }
  .tc-total { font-size:12px; color:var(--hint); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .tc-q { font-size:17px; font-weight:700; margin:0; line-height:1.45; letter-spacing:-0.01em; }
  .tc-q .vs { color:var(--hint); font-weight:600; font-size:14px; margin:0 4px; }
  .tc-mini { display:flex; gap:8px; margin-top:12px; }
  .tc-mini .m { flex:1; font-size:13px; font-weight:600; padding:10px 12px; border-radius:10px;
    text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tc-mini .m.a { color:var(--a); background:var(--a-soft); }
  .tc-mini .m.b { color:var(--b); background:var(--b-soft); }
  .tc-voted { font-size:13px; color:var(--muted); margin:12px 0 0; font-weight:500; }
  .tc-voted b { color:var(--text); }

  /* 投票エリア */
  .vote-area { margin-top:14px; display:none; }
  .topic-card.open .vote-area { display:block; }
  .opt { border:2px solid var(--border2); border-radius:14px; cursor:pointer; overflow:hidden;
    position:relative; background:var(--surface); margin-bottom:10px; transition:transform 0.06s, border-color 0.15s; }
  .opt:active { transform:scale(0.99); }
  .opt .fill { position:absolute; inset:0 auto 0 0; width:0%; transition:width 0.6s cubic-bezier(.2,.8,.2,1); opacity:0.16; }
  .opt .content { position:relative; display:flex; justify-content:space-between; align-items:center;
    padding:16px; z-index:1; min-height:56px; }
  .opt .lbl { font-size:16px; font-weight:700; }
  .opt .pct { font-size:18px; font-weight:800; font-variant-numeric:tabular-nums; opacity:0;
    transition:opacity 0.3s; }
  .opt.revealed .pct { opacity:1; }
  .opt.a .fill { background:var(--a-bar); } .opt.a .pct { color:var(--a); }
  .opt.b .fill { background:var(--b-bar); } .opt.b .pct { color:var(--b); }
  .opt.a.mychoice { border-color:var(--a); }
  .opt.b.mychoice { border-color:var(--b); }
  .opt .mark { font-size:11px; color:#fff; margin-left:8px; display:none; font-weight:700;
    background:var(--accent); padding:2px 7px; border-radius:999px; vertical-align:1px; }
  .opt.mychoice .mark { display:inline; }
  .opt .cnt { font-size:12px; color:var(--hint); margin-top:3px; font-variant-numeric:tabular-nums; }

  /* セグメントフィルタ */
  .seg-filter { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
  .seg-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .schip { font-size:12px; padding:7px 13px; border-radius:999px; border:1px solid var(--border2);
    background:var(--surface); color:var(--muted); cursor:pointer; font-weight:600; }
  .schip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .seg-sub { display:none; gap:6px; }
  .seg-sub select { font-size:14px; background:var(--surface); color:var(--text);
    border:1px solid var(--border2); border-radius:9px; padding:9px 12px; width:100%; }
  .seg-note { font-size:12px; color:var(--muted); margin:10px 0 0; min-height:14px; }

  .empty-list { text-align:center; color:var(--hint); font-size:14px; padding:40px 0; }

  /* 投稿 */
  .submit-block { margin-top:26px; padding:18px 16px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
  .submit-block h3 { font-size:15px; font-weight:700; color:var(--text); margin:0 0 14px; }
  .submit-row { margin-bottom:10px; }
  .submit-row input, .submit-row select { width:100%; height:50px; padding:0 14px; font-size:16px;
    background:var(--surface); border:1px solid var(--border2); border-radius:12px; color:var(--text); }
  .submit-row input:focus, .submit-row select:focus { outline:none; border-color:var(--b); }
  .submit-block .vs-mid { text-align:center; font-size:12px; color:var(--hint); margin:4px 0; font-weight:700; }
  .submit-block .sbtn { width:100%; height:52px; border-radius:13px; font-size:16px; font-weight:700;
    cursor:pointer; border:none; background:var(--a); color:#fff; margin-top:4px; }
  .submit-block .sbtn:active { background:#e63d7c; }
  .submit-err { color:var(--a); font-size:13px; min-height:16px; margin:8px 0 0; font-weight:600; }

  .toast { position:fixed; left:50%; top:18px; transform:translateX(-50%) translateY(-100px);
    background:var(--text); color:#fff; font-weight:600; padding:12px 22px; border-radius:999px;
    font-size:14px; opacity:0; transition:all 0.4s cubic-bezier(.2,.8,.2,1); z-index:60; pointer-events:none;
    max-width:90%; text-align:center; box-shadow:var(--shadow-lg); }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  .status { text-align:center; font-size:12px; color:var(--hint); margin:16px 0 0; min-height:16px; }
  .foot { text-align:center; font-size:12px; color:var(--hint); margin-top:20px; line-height:1.7; }

  /* モーダル */
  .modal-bg { position:fixed; inset:0; background:rgba(20,20,40,0.4); backdrop-filter:blur(2px);
    display:none; align-items:flex-end; justify-content:center; padding:0; z-index:50; }
  .modal-bg.show { display:flex; }
  .modal { background:var(--surface); border-radius:22px 22px 0 0; padding:24px 20px calc(24px + env(safe-area-inset-bottom));
    width:100%; max-width:440px; box-shadow:0 -4px 24px rgba(20,20,40,0.15);
    animation:slideUp 0.25s cubic-bezier(.2,.8,.2,1); }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal h2 { font-size:19px; font-weight:700; margin:0 0 8px; }
  .modal p { font-size:14px; color:var(--muted); margin:0 0 18px; line-height:1.6; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:7px; font-weight:600; }
  .field select { width:100%; height:50px; padding:0 12px; font-size:16px; background:var(--surface);
    border:1px solid var(--border2); border-radius:12px; color:var(--text); }
  .modal .row { display:flex; gap:10px; margin-top:8px; }
  .modal .row button { flex:1; height:52px; border-radius:13px; font-size:16px; font-weight:700; cursor:pointer; }
  .modal .primary { background:var(--a); color:#fff; border:none; }
  .modal .primary:active { background:#e63d7c; }
  .modal .ghost { background:var(--surface2); color:var(--muted); border:none; }
  .privacy { font-size:11px; color:var(--hint); margin-top:14px; line-height:1.6; }
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<div class="wrap">
  <div class="title">
    <h1>世界一どうでもいい投票所</h1>
    <p class="sub">気になる二択を選んで投票。属性別に見ると面白い。</p>
  </div>

  <div class="profbar">
    <span class="pinfo" id="profInfo">プロフィール未設定</span>
    <button id="editProf">設定</button>
  </div>

  <div class="genre-bar" id="genreBar"></div>

  <div class="list" id="list"><p class="empty-list">読み込み中…</p></div>

  <div class="submit-block">
    <h3>💡 お題を投稿する</h3>
    <div class="submit-row"><select id="inGenre"></select></div>
    <div class="submit-row"><input id="inA" placeholder="選択肢A（例: きのこの山）" maxlength="24" /></div>
    <div class="vs-mid">VS</div>
    <div class="submit-row"><input id="inB" placeholder="選択肢B（例: たけのこの里）" maxlength="24" /></div>
    <button class="sbtn" id="submitBtn">この究極の二択を投稿</button>
    <p class="submit-err" id="submitErr"></p>
  </div>

  <div class="status" id="status">接続中…</div>

  <p class="foot">
    投票は1お題につき1票（変更可）。<br>
    集めるのは集計値だけ。個人を特定する情報は保存しません。
  </p>
</div>

<div class="modal-bg" id="profBg">
  <div class="modal">
    <h2>あなたのことを少しだけ</h2>
    <p>属性を選ぶと、年代・性別・地方ごとの投票傾向が見られます。すべて任意。スキップしても投票できます。</p>
    <div class="field">
      <label>年代</label>
      <select id="selAge">
        <option value="">未選択</option>
        <option value="10">10代</option><option value="20">20代</option>
        <option value="30">30代</option><option value="40">40代</option>
        <option value="50">50代</option><option value="60">60代</option>
        <option value="70">70代以上</option>
      </select>
    </div>
    <div class="field">
      <label>性別</label>
      <select id="selGender">
        <option value="">未選択</option>
        <option value="male">男性</option><option value="female">女性</option>
        <option value="other">その他・回答しない</option>
      </select>
    </div>
    <div class="field">
      <label>住んでいる地域（都道府県）</label>
      <select id="selPref"><option value="">未選択</option></select>
    </div>
    <div class="row">
      <button class="ghost" id="skipProf">スキップ</button>
      <button class="primary" id="saveProf">保存</button>
    </div>
    <p class="privacy">※ プロフィールはこの端末内にのみ保存され、投票時は集計用のセグメント（年代/性別/地方）としてのみ送信されます。氏名や個人を特定する情報は一切集めません。</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue, push, get }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ===== ここを自分のFirebase設定に書き換える =====
const firebaseConfig = {
  apiKey: "THE_BUTTONと同じAPIキーをここに貼る",
  authDomain: "one-button-7ab53.firebaseapp.com",
  databaseURL: "https://one-button-7ab53-default-rtdb.firebaseio.com",
  projectId: "one-button-7ab53",
};
// ================================================

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const $ = id => document.getElementById(id);

// ジャンル定義
const GENRES = [
  ["food","🍫 食べ物"],
  ["love","❤️ 恋愛・人間関係"],
  ["life","🏠 生活習慣"],
  ["work","💼 仕事"],
  ["ultimate","⚖️ 究極の選択"],
  ["whatever","🤷 どうでもいい"],
];
const GENRE_LABEL = Object.fromEntries(GENRES);

// プリセット（[a,b,genre]）
const PRESETS = [
  ["きのこの山","たけのこの里","food"],
  ["カレーは飲み物","カレーは食べ物","food"],
  ["パイナップルはピザに合う","合わない","food"],
  ["味噌汁は飲み物","味噌汁はおかず","food"],
  ["告白するなら直接","LINEでもOK","love"],
  ["デート割り勘","おごる/おごられる","love"],
  ["朝シャワー","夜シャワー","life"],
  ["風呂で頭から洗う","体から洗う","life"],
  ["仕事は対面","リモート","work"],
  ["報告は口頭","テキスト","work"],
  ["無人島に1冊持つなら漫画","小説","ultimate"],
  ["世界の終わりに寿司","ラーメン","ultimate"],
  ["猫派","犬派","whatever"],
  ["卵が先","ニワトリが先","whatever"],
];

const PREFS = [
  ["北海道","hokkaido"],["青森県","tohoku"],["岩手県","tohoku"],["宮城県","tohoku"],["秋田県","tohoku"],["山形県","tohoku"],["福島県","tohoku"],
  ["茨城県","kanto"],["栃木県","kanto"],["群馬県","kanto"],["埼玉県","kanto"],["千葉県","kanto"],["東京都","kanto"],["神奈川県","kanto"],
  ["新潟県","chubu"],["富山県","chubu"],["石川県","chubu"],["福井県","chubu"],["山梨県","chubu"],["長野県","chubu"],["岐阜県","chubu"],["静岡県","chubu"],["愛知県","chubu"],
  ["三重県","kansai"],["滋賀県","kansai"],["京都府","kansai"],["大阪府","kansai"],["兵庫県","kansai"],["奈良県","kansai"],["和歌山県","kansai"],
  ["鳥取県","chugoku"],["島根県","chugoku"],["岡山県","chugoku"],["広島県","chugoku"],["山口県","chugoku"],
  ["徳島県","shikoku"],["香川県","shikoku"],["愛媛県","shikoku"],["高知県","shikoku"],
  ["福岡県","kyushu"],["佐賀県","kyushu"],["長崎県","kyushu"],["熊本県","kyushu"],["大分県","kyushu"],["宮崎県","kyushu"],["鹿児島県","kyushu"],["沖縄県","kyushu"],
];
const REGION_LABEL = {hokkaido:"北海道",tohoku:"東北",kanto:"関東",chubu:"中部",kansai:"関西",chugoku:"中国",shikoku:"四国",kyushu:"九州・沖縄"};
const AGE_LABEL = {"10":"10代","20":"20代","30":"30代","40":"40代","50":"50代","60":"60代","70":"70代以上"};
const GENDER_LABEL = {male:"男性",female:"女性",other:"その他"};

function prefToRegion(p){ const f=PREFS.find(x=>x[0]===p); return f?f[1]:null; }
function uid(){ let u=localStorage.getItem("dv_uid"); if(!u){u="u"+Math.random().toString(36).slice(2,10);localStorage.setItem("dv_uid",u);} return u; }
function esc(s){ return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2400); }

let profile=JSON.parse(localStorage.getItem("dv_profile")||"null");
let myVotes=JSON.parse(localStorage.getItem("dv_votes")||"{}");
let topics=[];           // [{id,a,b,genre,votesA,votesB,seg}]
let curGenre="all";
let openId=null;         // 展開中のお題
let segState={};         // {topicId:{seg,sub}}

// ---- プロフィール ----
(function fillPref(){ const s=$("selPref"); PREFS.forEach(([n])=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; s.appendChild(o); }); })();
function renderProfBar(){
  if(profile&&(profile.age||profile.gender||profile.pref)){
    const p=[]; if(profile.age)p.push(AGE_LABEL[profile.age]); if(profile.gender)p.push(GENDER_LABEL[profile.gender]); if(profile.pref)p.push(profile.pref);
    $("profInfo").textContent="👤 "+p.join(" · ");
  } else $("profInfo").textContent="プロフィール未設定（タップで設定）";
}
function openProf(){ $("selAge").value=profile?.age||""; $("selGender").value=profile?.gender||""; $("selPref").value=profile?.pref||""; $("profBg").classList.add("show"); }
$("editProf").addEventListener("click",openProf);
$("profInfo").addEventListener("click",openProf);
$("saveProf").addEventListener("click",()=>{
  const age=$("selAge").value,gender=$("selGender").value,pref=$("selPref").value;
  profile={age,gender,pref,region:pref?prefToRegion(pref):null};
  localStorage.setItem("dv_profile",JSON.stringify(profile));
  localStorage.setItem("dv_profile_asked","1");
  $("profBg").classList.remove("show"); renderProfBar(); toast("プロフィールを保存した");
});
$("skipProf").addEventListener("click",()=>{ localStorage.setItem("dv_profile_asked","1"); $("profBg").classList.remove("show"); });

// ---- ジャンルバー ----
function buildGenreBar(){
  const bar=$("genreBar"); bar.innerHTML="";
  const all=document.createElement("span");
  all.className="gchip"+(curGenre==="all"?" active":""); all.textContent="すべて"; all.dataset.g="all";
  bar.appendChild(all);
  GENRES.forEach(([g,label])=>{
    const c=document.createElement("span");
    c.className="gchip"+(curGenre===g?" active":""); c.textContent=label; c.dataset.g=g;
    bar.appendChild(c);
  });
  bar.querySelectorAll(".gchip").forEach(c=>c.addEventListener("click",()=>{ curGenre=c.dataset.g; buildGenreBar(); renderList(); }));
}

// ---- 投稿フォームのジャンル ----
(function fillSubmitGenre(){ const s=$("inGenre"); s.innerHTML='<option value="">ジャンルを選ぶ</option>'; GENRES.forEach(([g,l])=>{ const o=document.createElement("option"); o.value=g; o.textContent=l; s.appendChild(o); }); })();

// ---- 集計取り出し ----
function getCounts(t,seg,sub){
  if(seg==="all"||!seg) return [t.votesA||0,t.votesB||0,"全体"];
  const s=(t.seg&&t.seg[seg]&&t.seg[seg][sub])||{a:0,b:0};
  let label = seg==="age"?AGE_LABEL[sub] : seg==="gender"?GENDER_LABEL[sub] : REGION_LABEL[sub];
  return [s.a||0,s.b||0,label];
}

// ---- リスト描画 ----
function renderList(){
  const list=$("list");
  const filtered = curGenre==="all" ? topics : topics.filter(t=>t.genre===curGenre);
  if(filtered.length===0){ list.innerHTML='<p class="empty-list">このジャンルにはまだお題がありません</p>'; return; }
  list.innerHTML="";
  filtered.forEach(t=>{
    const my=myVotes[t.id], voted=!!my;
    const tot=(t.votesA||0)+(t.votesB||0);
    const card=document.createElement("div");
    card.className="topic-card"+(openId===t.id?" open":"");
    card.innerHTML = `
      <div class="tc-head">
        <span class="tc-genre">${GENRE_LABEL[t.genre]||"🤷 その他"}</span>
        <span class="tc-total">${tot.toLocaleString()}票</span>
      </div>
      <p class="tc-q">${esc(t.a)} <span style="color:var(--hint)">vs</span> ${esc(t.b)}</p>
      ${openId===t.id ? renderVoteArea(t) : (voted ? `<p class="tc-voted">投票済み：${my==='a'?esc(t.a):esc(t.b)}（タップで詳細）</p>` : `<div class="tc-mini"><span class="m a">${esc(t.a)}</span><span class="m b">${esc(t.b)}</span></div>`)}
    `;
    card.addEventListener("click",e=>{
      if(e.target.closest(".vote-area")) return; // 投票UI内のクリックは無視
      openId = openId===t.id ? null : t.id;
      renderList();
    });
    if(openId===t.id){
      // 投票ボタンのイベントを後付け
      setTimeout(()=>bindVoteArea(card,t),0);
    }
    list.appendChild(card);
  });
}

function renderVoteArea(t){
  const st=segState[t.id]||{seg:"all",sub:null};
  const my=myVotes[t.id], voted=!!my;
  const [va,vb,segLabel]=getCounts(t,st.seg,st.sub);
  const tot=va+vb;
  const pa=tot?Math.round(va/tot*100):0, pb=tot?100-pa:0;
  const segTabs=[["all","🌍全体"],["age","年代"],["gender","性別"],["region","地方"]]
    .map(([s,l])=>`<span class="schip${st.seg===s?' active':''}" data-seg="${s}">${l}</span>`).join("");
  let subHtml="";
  if(st.seg!=="all"){
    let opts=[];
    if(st.seg==="age")opts=Object.entries(AGE_LABEL);
    if(st.seg==="gender")opts=Object.entries(GENDER_LABEL);
    if(st.seg==="region")opts=Object.entries(REGION_LABEL);
    subHtml=`<div class="seg-sub" style="display:flex"><select class="segSub">${opts.map(([v,l])=>`<option value="${v}"${v===st.sub?' selected':''}>${l}</option>`).join("")}</select></div>`;
  }
  return `<div class="vote-area">
    <div class="opt a${my==='a'?' mychoice':''}${voted?' revealed':''}" data-side="a">
      <div class="fill" style="width:${voted?pa:0}%"></div>
      <div class="content"><div><span class="lbl">${esc(t.a)}</span><span class="mark">✓</span>
        <div class="cnt">${voted?va.toLocaleString()+'票':''}</div></div><span class="pct">${pa}%</span></div>
    </div>
    <div class="opt b${my==='b'?' mychoice':''}${voted?' revealed':''}" data-side="b">
      <div class="fill" style="width:${voted?pb:0}%"></div>
      <div class="content"><div><span class="lbl">${esc(t.b)}</span><span class="mark">✓</span>
        <div class="cnt">${voted?vb.toLocaleString()+'票':''}</div></div><span class="pct">${pb}%</span></div>
    </div>
    <div class="seg-filter">
      <div class="seg-tabs">${segTabs}</div>
      ${subHtml}
      <p class="seg-note">${voted ? (st.seg==="all"?"":`「${segLabel}」の傾向（${tot.toLocaleString()}票）`) : "投票すると結果が見られます"}</p>
    </div>
  </div>`;
}

function bindVoteArea(card,t){
  card.querySelectorAll(".opt").forEach(opt=>{
    opt.addEventListener("click",e=>{ e.stopPropagation(); vote(t.id,opt.dataset.side); });
  });
  card.querySelectorAll(".schip").forEach(ch=>{
    ch.addEventListener("click",e=>{ e.stopPropagation();
      const st=segState[t.id]||{seg:"all",sub:null};
      st.seg=ch.dataset.seg;
      if(st.seg==="age")st.sub=profile?.age||"20";
      else if(st.seg==="gender")st.sub=profile?.gender||"male";
      else if(st.seg==="region")st.sub=profile?.region||"kanto";
      else st.sub=null;
      segState[t.id]=st; renderList();
    });
  });
  const sub=card.querySelector(".segSub");
  if(sub) sub.addEventListener("change",e=>{ e.stopPropagation(); const st=segState[t.id]||{seg:"all",sub:null}; st.sub=e.target.value; segState[t.id]=st; renderList(); });
}

// ---- 投票 ----
function vote(id,side){
  if(!localStorage.getItem("dv_profile_asked")){ openProf(); return; }
  const prev=myVotes[id];
  if(prev===side) return;
  myVotes[id]=side; localStorage.setItem("dv_votes",JSON.stringify(myVotes));
  const seg=profile||{};
  runTransaction(ref(db,"topics/"+id), t=>{
    if(!t) return t;
    t.voters=t.voters||{};
    const before=t.voters[uid()];
    if(before==='a') t.votesA=Math.max(0,(t.votesA||0)-1);
    if(before==='b') t.votesB=Math.max(0,(t.votesB||0)-1);
    if(side==='a') t.votesA=(t.votesA||0)+1;
    if(side==='b') t.votesB=(t.votesB||0)+1;
    t.seg=t.seg||{};
    const bump=(dim,key)=>{
      if(!key) return;
      t.seg[dim]=t.seg[dim]||{}; t.seg[dim][key]=t.seg[dim][key]||{a:0,b:0};
      if(before==='a') t.seg[dim][key].a=Math.max(0,t.seg[dim][key].a-1);
      if(before==='b') t.seg[dim][key].b=Math.max(0,t.seg[dim][key].b-1);
      if(side==='a') t.seg[dim][key].a=(t.seg[dim][key].a||0)+1;
      if(side==='b') t.seg[dim][key].b=(t.seg[dim][key].b||0)+1;
    };
    bump('age',seg.age); bump('gender',seg.gender); bump('region',seg.region);
    t.voters[uid()]=side;
    return t;
  });
}

// ---- 投稿 ----
$("submitBtn").addEventListener("click", async ()=>{
  const genre=$("inGenre").value;
  const a=$("inA").value.trim().slice(0,24), b=$("inB").value.trim().slice(0,24);
  if(!genre){ $("submitErr").textContent="ジャンルを選んでください"; return; }
  if(!a||!b){ $("submitErr").textContent="両方の選択肢を入れてください"; return; }
  if(a===b){ $("submitErr").textContent="同じ選択肢は二択になりません"; return; }
  $("submitErr").textContent="";
  const order=topics.length; const r=push(ref(db,"topics"));
  await runTransaction(r, ()=>({a,b,genre,votesA:0,votesB:0,order}));
  $("inA").value=""; $("inB").value=""; $("inGenre").value="";
  toast("✅ お題を世界に追加した！");
  curGenre=genre; openId=r.key; buildGenreBar(); renderList();
});

// ---- 初期化 ----
async function ensurePresets(){
  const snap=await get(ref(db,"topics"));
  if(!snap.exists()){
    for(let i=0;i<PRESETS.length;i++){ const [a,b,genre]=PRESETS[i]; const r=push(ref(db,"topics")); await runTransaction(r,()=>({a,b,genre,votesA:0,votesB:0,order:i})); }
  }
}
async function init(){
  renderProfBar(); buildGenreBar();
  try{ await ensurePresets(); }
  catch(e){ $("status").textContent="接続エラー: Firebase設定を確認してください"; return; }
  onValue(ref(db,"topics"), snap=>{
    const val=snap.val()||{};
    topics=Object.entries(val).map(([id,v])=>({id,a:v.a,b:v.b,genre:v.genre||"whatever",votesA:v.votesA||0,votesB:v.votesB||0,seg:v.seg||{},order:v.order??0})).sort((x,y)=>x.order-y.order);
    $("status").textContent="接続済み · 全世界とリアルタイム共有";
    renderList();
  }, err=>{ $("status").textContent="接続エラー: Firebase設定を確認してください"; });
  if(!localStorage.getItem("dv_profile_asked")) setTimeout(openProf,600);
}
init();
</script>
